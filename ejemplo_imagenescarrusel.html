  <!-- first function sets the text and the format, like cupcake, crepe, pie etc -->
  <!-- second function  changes the lines under the text there are some curios functions like border button that gives format to the text and the image -->
  
  <style>
    .carousel-indicators {
  position: unset;
  flex-direction: column;
  width: 100%;
  margin: 0;
  padding: 1em;
}
.carousel-indicators [data-bs-target] {
  text-indent: 0; /*defines the indent */
  width: 100%;
  height: 100%;
  opacity: 1; /* opacity apparently not doing anything*/
  background-color: transparent; /*defines the backround color inside the text and lines*/ 
  border-bottom: 1px solid #000000; /*defines the looking of the lines, the width and the color*/
  border-top: 0; 
  display: flex; /*configurates the alignment of the text, only flex makes it stand left, any other command makes it go to center*/
  align-items: center;
  justify-content: space-between;
}
.carousel-indicators [data-bs-target].active {
  color: rgb(169, 99, 33); 
}
.carousel {
  background-color: beige;
}
.carousel-inner img {
  height: 100px;
  width: 100px;
  max-height: 300px;
  max-width: 200px;
  padding: 1em;
  margin-inline: auto;
  object-fit: cover;
}
.carousel-inner .img2 {
    height: 300px;
    width: 200px;
    max-height: 300px;
    max-width: 200px;
    padding: 1em;
    margin-inline: auto;
    object-fit: cover;
}
@media screen and (min-width: 576px) {
  .carousel {
    padding: 2em;
    font-size: 1.3em;
  }
  
}
.circle{
    height: 300px;
    width: 300px;
    max-height: 300px;
    max-width: 300px;
    border-radius: 50%;

    border:1px solid black;
    display: flex;
    align-items: center;
    object-fit: cover;
    width: 100%;
    height: 100%;
  }

  
    </style>
